<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#e53935"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#42a5f5"/><stop offset="100%" stop-color="#1e88e5"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="320" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="320" y="36" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Open + Parse Time — Lower is Better</text>

  <!-- Legend -->
  <rect x="200" y="50" width="12" height="12" rx="3" fill="url(#g1)"/>
  <text x="218" y="61" fill="#f85149" font-size="12">excel</text>
  <rect x="340" y="50" width="12" height="12" rx="3" fill="url(#g2)"/>
  <text x="358" y="61" fill="#58a6ff" font-size="12">excel_plus</text>

  <!-- 10K cells -->
  <text x="100" y="104" text-anchor="end" fill="#8b949e" font-size="13">10K cells</text>
  <rect x="115" y="90" width="400" height="24" rx="6" fill="url(#g1)" opacity="0.9"/>
  <text x="520" y="107" fill="#f85149" font-size="12" font-weight="600">250 ms</text>
  <rect x="115" y="118" width="262" height="24" rx="6" fill="url(#g2)" opacity="0.9"/>
  <text x="382" y="135" fill="#58a6ff" font-size="12" font-weight="600">164 ms</text>
  <text x="600" y="120" text-anchor="end" fill="#3fb950" font-size="13" font-weight="700">34% faster</text>

  <!-- 100K cells -->
  <text x="100" y="192" text-anchor="end" fill="#8b949e" font-size="13">100K cells</text>
  <rect x="115" y="178" width="400" height="24" rx="6" fill="url(#g1)" opacity="0.9"/>
  <text x="520" y="195" fill="#f85149" font-size="12" font-weight="600">2,400 ms</text>
  <rect x="115" y="206" width="128" height="24" rx="6" fill="url(#g2)" opacity="0.9"/>
  <text x="248" y="223" fill="#58a6ff" font-size="12" font-weight="600">768 ms</text>
  <text x="600" y="208" text-anchor="end" fill="#3fb950" font-size="13" font-weight="700">68% faster</text>

  <!-- 5M cells -->
  <text x="100" y="280" text-anchor="end" fill="#8b949e" font-size="13">5M cells</text>
  <rect x="115" y="266" width="400" height="24" rx="6" fill="url(#g1)" opacity="0.9"/>
  <text x="520" y="283" fill="#f85149" font-size="12" font-weight="600">46.3 s</text>
  <rect x="115" y="294" width="54" height="24" rx="6" fill="url(#g2)" opacity="0.9"/>
  <text x="174" y="311" fill="#58a6ff" font-size="12" font-weight="600">6.2 s</text>
  <text x="600" y="296" text-anchor="end" fill="#3fb950" font-size="13" font-weight="700">7× faster</text>
</svg>
