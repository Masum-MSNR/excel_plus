name: excel_plus
description: >-
  A fast, memory-efficient Dart & Flutter library for reading, creating,
  editing and saving Excel (.xlsx) files. Drop-in replacement for the excel
  package with 7x faster open times and 4x lower memory on large workbooks.
version: 0.0.1
homepage: https://github.com/Masum-MSNR/excel_plus
repository: https://github.com/Masum-MSNR/excel_plus
issue_tracker: https://github.com/Masum-MSNR/excel_plus/issues
topics:
  - excel
  - xlsx
  - spreadsheet
  - office
  - dart

environment:
  sdk: ^3.11.4

dependencies:
  archive: ^4.0.4
  xml: ">=5.0.0 <7.0.0"
  collection: ^1.15.0
  equatable: ^2.0.0
  web: ^1.1.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
